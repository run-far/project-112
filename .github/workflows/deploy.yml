name: Deploy StrideHQ to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository laden
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: project112-app/package-lock.json

      - name: Abhängigkeiten installieren
        working-directory: project112-app
        run: npm ci

      - name: StrideHQ bauen
        working-directory: project112-app
        run: npm run build

      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Build hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: project112-app/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
